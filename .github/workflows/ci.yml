name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Registry CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build registry
        run: npm run registry:build

      - name: Schema validate registry JSON
        run: node scripts/validate-registry-schema.mjs

      - name: TypeScript check (registry components)
        run: npx tsc --noEmit -p registry/

      - name: Check registryDependencies resolve
        run: node scripts/check-registry-deps.mjs

      - name: Stylelint registry CSS
        run: npx stylelint 'registry/**/*.css'
